name: CI/CD Pipeline

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]
  release:
    types: [published]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      
    - name: Lint code
      run: npm run lint

  validate-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Validate package.json
      run: npm run build
      
    - name: Check for version conflicts
      run: echo "✅ PR validation completed"

  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Setup deployment environment
      run: |
        echo "STAGING_DEPLOY_USER=${{ secrets.STAGING_USER }}" >> .env
        echo "STAGING_DEPLOY_HOST=${{ secrets.STAGING_HOST }}" >> .env
        echo "STAGING_DEPLOY_PATH=${{ secrets.STAGING_PATH }}" >> .env
        echo "STAGING_DEPLOY_CONTAINER=n8n" >> .env
        
    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
        
    - name: Deploy to Staging
      run: npm run deploy

  prepare-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build for release
      run: npm run build
      
    - name: Prepare release notes
      run: echo "✅ Ready for release creation"

  deploy-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Deploy to Production
      run: npm run deployProduction
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
