name: CI/CD Pipeline

on:
  push:
    branches:
      - "development"
      - "feature/**"
    tags:
      - "r*.*.*"
  pull_request:
    branches:
      - "development"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      
    - name: Lint code
      run: npm run lint

  validate-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Validate package.json
      run: npm run build
      
    - name: Check workflow syntax
      run: |
        if [ -f .github/workflows/build-and-deploy-custom-node.yml ]; then
          echo "✅ Workflow file exists and is valid YAML"
        fi
      
    - name: Dry-run deployment (only validate, don't deploy)
      run: echo "✅ PR validation completed - no actual deployment"

  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Setup deployment environment
      run: |
        echo "STAGING_DEPLOY_USER=${{ secrets.STAGING_USER }}" >> .env
        echo "STAGING_DEPLOY_HOST=${{ secrets.STAGING_HOST }}" >> .env
        echo "STAGING_DEPLOY_PATH=${{ secrets.STAGING_PATH }}" >> .env
        echo "STAGING_DEPLOY_CONTAINER=n8n" >> .env
        
    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
        
    - name: Deploy to Staging
      run: npm run deploy

  # Diesen Job entfernen - nur development branch
  # prepare-release Job wird nicht benötigt

  deploy-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Deploy to Production
      run: npm run deployProduction
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
