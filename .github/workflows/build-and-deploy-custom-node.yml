name: CI/CD Pipeline

on:
  push:
    branches:
      - "development"
      - "feature/**"
    tags:
      - "r*.*.*"
  pull_request:
    branches:
      - "development"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Lint code
      run: npm run lint
      
    - name: Build project
      run: npm run build

  deploy-staging:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: lint-and-build
    
    steps:
    - name: Checkout  PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
        
    - name: Deploy to Staging
      run: npm run deploy
      env:
        STAGING_DEPLOY_USER: ${{ secrets.STAGING_USER }}
        STAGING_DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
        STAGING_DEPLOY_PATH: ${{ secrets.STAGING_PATH }}
        STAGING_DEPLOY_CONTAINER: ${{ secrets.STAGING_CONTAINER_NAME }}

  # Diesen Job entfernen - nur development branch
  # prepare-release Job wird nicht benötigt

  deploy-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Deploy to Production
      run: npm run deployProduction
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
